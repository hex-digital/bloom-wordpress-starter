name: Main

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  node:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[ci skip]')
    
    strategy:
      matrix:
        node: ['20.19.0', '22.12.0']

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v4

      - name: Setup the Node ${{ matrix.node }} environment 🏗
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          check-latest: true
          cache: 'npm'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install npm dependencies 👨🏻‍💻
        run: npm install

      - name: Build and compile assets 🖥
        run: |
          npm run build
          test -f public/build/manifest.json && cat public/build/manifest.json || true

  php:
    name: PHP 8.3
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[ci skip]')

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v4

      - name: Setup the PHP 8.3 environment 🏗
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: xdebug
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set composer cache directory 🗄️
        id: composercache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Restore the composer cache 🗂️
        uses: actions/cache@v4
        with:
          path: ${{ steps.composercache.outputs.dir }}
          key: ${{ runner.os }}-php83-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-php83-composer-

      - name: Install Composer dependencies 👨🏻‍💻
        run: composer install --no-progress --prefer-dist --optimize-autoloader --no-suggest

      - name: Run Pint 🍺
        run: vendor/bin/pint --test
